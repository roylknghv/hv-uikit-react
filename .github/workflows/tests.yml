name: Tests

on:
  workflow_dispatch:
  workflow_call:

jobs:
  checks:
    name: Static Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies

      - name: Run Format
        run: npm run prettier

      - name: Run Lint
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies

      - name: License Check
        run: npx license-compliance

      - name: Security Audit
        run: npm audit --workspaces --omit dev --audit-level high

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies

      - name: Run Test
        run: npm run test

  storybook:
    # storybook runs a11y and component tests
    name: Storybook Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies

      - name: Install Playwright
        run: npx playwright install --with-deps --only-shell chromium

      - name: Run Tests
        run: npm run test:storybook -- --no-file-parallelism --retry 1 --shard=${{ matrix.shard }}/${{ strategy.job-total }}

  build:
    name: Build
    uses: ./.github/workflows/build.yml
    with:
      build-all: false
